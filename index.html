<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Noji Tycoon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <span class="crest">⬢</span>
        <div>
          <p>PROJECT NOJI</p>
          <h1>Noji Tycoon</h1>
        </div>
      </div>
      <div id="resource-bar" class="resource-bar"></div>
    </header>

    <nav class="theme-switcher" aria-label="design theme selector">
      <span class="theme-label">THEME</span>
      <button data-theme="frontier">Frontier</button>
      <button data-theme="civilization">Civilization</button>
      <button data-theme="clan">Clan Builder</button>
      <button data-theme="blueprint">Blueprint</button>
      <button data-theme="forest" class="active">Forest Night</button>
    </nav>

    <main class="game-shell">
      <aside class="side-panel left-panel">
        <section class="land-card ornate">
          <p class="label">LAND STATUS</p>
          <h2 id="land-name">Loading...</h2>
          <div class="level-meter">
            <span id="land-level">Lv.?</span>
            <div class="meter"><i id="level-fill"></i></div>
          </div>
          <p id="land-summary"></p>
        </section>

        <section class="panel">
          <div class="panel-title"><h3>Tech Era</h3><span>unlock ladder</span></div>
          <div id="levels" class="era-list"></div>
        </section>
      </aside>

      <section class="map-stage">
        <div class="map-toolbar">
          <div class="map-title">
            <strong>Hachunri 179-2</strong>
            <span>1칸 = 1m×1m · 드래그 이동 · 휠 줌 · 클릭 선택</span>
          </div>
          <div class="map-buttons">
            <button id="toggle-map-editor" class="primary-map-button">🛠 Map Editor</button>
            <label class="opacity-control">이미지 투명도 <input id="overlay-opacity" type="range" min="0" max="100" value="48" /></label>
          </div>
        </div>

        <div id="zone-legend" class="legend legend-top"></div>

        <div id="map-frame-wrap" class="map-frame-wrap">
          <div id="map-frame" class="map-frame">
            <div id="map-canvas-layer" class="map-canvas-layer">
              <svg id="tile-svg" role="img" aria-label="Noji square land map"></svg>
              <img id="parcel-overlay" class="parcel-overlay" src="/overlays/hachunri-179-2-available-land.png" alt="하천리 179-2 가용 토지 참고 이미지" />
            </div>
          </div>

          <div class="editor-rail" role="toolbar" aria-label="map editor tools">
            <button data-editor-tool="inspect" class="active" title="Inspect — 보기/선택 (V)"><span>👆</span><small>보기</small></button>
            <button data-editor-tool="paint" title="Paint — 구역 칠하기 (B)"><span>🖌</span><small>칠하기</small></button>
            <button data-editor-tool="erase" title="Erase — wild로 되돌리기 (E)"><span>🧽</span><small>지우개</small></button>
            <button data-editor-tool="measure" title="Measure — 거리 측정 (M)"><span>📏</span><small>측정</small></button>
            <i class="rail-divider"></i>
            <button id="editor-settings-toggle" title="맵 크기 · 파일 · 참고 이미지"><span>⚙</span><small>설정</small></button>
          </div>

          <div id="editor-context" class="editor-context" hidden></div>

          <div id="editor-settings" class="editor-settings" hidden>
            <div class="settings-head">
              <strong>맵 설정</strong>
              <button id="editor-settings-close" title="닫기">✕</button>
            </div>
            <section>
              <h4>맵 크기 (m)</h4>
              <div class="settings-row">
                <input id="map-width-input" type="number" min="8" max="120" step="1" />
                <span class="dim">×</span>
                <input id="map-height-input" type="number" min="8" max="120" step="1" />
                <button id="apply-map-size">적용</button>
              </div>
            </section>
            <section>
              <h4>맵 파일</h4>
              <div class="settings-row">
                <button id="save-inline-map">💾 저장</button>
                <button id="load-inline-map">📂 불러오기</button>
                <button id="export-inline-map">⬇ Export</button>
              </div>
            </section>
            <section>
              <h4>참고 이미지</h4>
              <div class="settings-row">
                <button id="upload-overlay-image">삽입/변경</button>
                <button id="reset-overlay-image">기본</button>
                <button id="delete-overlay-image">삭제</button>
              </div>
              <label class="settings-slider">크기 <input id="overlay-scale" type="range" min="20" max="220" value="100" /><span id="overlay-scale-label">100%</span></label>
              <label class="settings-slider">위치 X <input id="overlay-offset-x" type="range" min="-100" max="100" value="0" /><span id="overlay-offset-x-label">0%</span></label>
              <label class="settings-slider">위치 Y <input id="overlay-offset-y" type="range" min="-100" max="100" value="0" /><span id="overlay-offset-y-label">0%</span></label>
            </section>
            <input id="inline-map-file" type="file" accept="application/json,.json" hidden />
            <input id="overlay-image-file" type="file" accept="image/*" hidden />
          </div>

          <div class="map-hud-zoom">
            <button id="map-zoom-in" title="확대">＋</button>
            <button id="map-zoom-reset" title="100%로">100%</button>
            <button id="map-zoom-out" title="축소">−</button>
            <button id="map-fit" title="화면에 맞추기">⛶</button>
          </div>
          <div id="tile-tooltip" class="tile-tooltip" hidden></div>
        </div>

        <div id="inline-editor-stats" class="inline-editor-stats"></div>
      </section>

      <aside class="side-panel right-panel">
        <section class="panel">
          <div class="panel-title"><h3>Active Quests</h3><span>missions</span></div>
          <div id="quests" class="quest-list"></div>
        </section>

        <section class="panel">
          <div class="panel-title"><h3>Build Objects</h3><span>owned / locked</span></div>
          <div id="objects" class="object-grid"></div>
        </section>
      </aside>
    </main>

    <section class="bottom-dock">
      <div class="panel wide">
        <div class="panel-title"><h3>Available Actions</h3><span>change the land</span></div>
        <div id="actions" class="action-row"></div>
      </div>
      <div class="panel players-panel">
        <div class="panel-title"><h3>Players</h3><span>party</span></div>
        <div id="players" class="players"></div>
      </div>
    </section>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
