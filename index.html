<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Noji Tycoon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <span class="crest">⬢</span>
        <div>
          <p>PROJECT NOJI</p>
          <h1>Noji Tycoon</h1>
        </div>
      </div>
      <div id="resource-bar" class="resource-bar"></div>
    </header>

    <nav class="theme-switcher" aria-label="design theme selector">
      <button data-theme="frontier">1 Frontier</button>
      <button data-theme="civilization">2 Civilization</button>
      <button data-theme="clan">3 Clan Builder</button>
      <button data-theme="blueprint">4 Blueprint</button>
      <button data-theme="forest" class="active">5 Forest Night</button>
    </nav>

    <main class="game-shell">
      <aside class="side-panel left-panel">
        <section class="land-card ornate">
          <p class="label">LAND STATUS</p>
          <h2 id="land-name">Loading...</h2>
          <div class="level-meter">
            <span id="land-level">Lv.?</span>
            <div class="meter"><i id="level-fill"></i></div>
          </div>
          <p id="land-summary"></p>
        </section>

        <section class="panel">
          <div class="panel-title"><h3>Tech Era</h3><span>unlock ladder</span></div>
          <div id="levels" class="era-list"></div>
        </section>
      </aside>

      <section class="map-stage">
        <div class="map-toolbar">
          <div>
            <strong>Hachunri 179-2</strong>
            <span>1 hex ≈ 1평 · Honeycomb SVG grid</span>
          </div>
          <div class="map-buttons"><button id="toggle-map-editor" class="primary-map-button">Map Editor</button><button id="reset-selection">Reset View</button></div>
        </div>
        <div id="inline-editor-panel" class="inline-editor-panel" aria-hidden="true">
          <div class="editor-mode-row">
            <strong>In-game Map Editor</strong>
            <span>1 hex = 1평 · 같은 맵 상태에서 편집</span>
          </div>
          <div class="inline-editor-controls">
            <button data-editor-tool="inspect" class="active">Inspect</button>
            <button data-editor-tool="paint">Paint</button>
            <button data-editor-tool="measure">Measure m</button>
            <button data-editor-tool="erase">Erase</button>
            <label>Zone
              <select id="inline-zone-select">
                <option value="wild">Wild / 자연</option>
                <option value="access">Access / 동선</option>
                <option value="parking">Parking / 주차</option>
                <option value="camp">Camp / 캠핑</option>
                <option value="utility">Utility / 기반시설</option>
                <option value="garden">Garden / 텃밭</option>
                <option value="rest">Rest / 쉼터</option>
                <option value="restricted">Restricted / 제한</option>
              </select>
            </label>
            <label>Brush
              <select id="brush-size-select">
                <option value="1">1 hex</option>
                <option value="3">3 hex</option>
                <option value="5">5 hex</option>
              </select>
            </label>
            <button id="save-inline-map">Save Local</button><button id="load-inline-map">Load JSON</button><button id="export-inline-map">Export JSON</button><input id="inline-map-file" type="file" accept="application/json,.json" hidden />
          </div>
          <div class="map-settings">
            <label>Width <input id="map-width-input" type="number" min="8" max="80" step="1" /></label>
            <label>Height <input id="map-height-input" type="number" min="8" max="80" step="1" /></label>
            <button id="apply-map-size">Apply Size</button>
            <button id="fit-map-view">Fit View</button>
          </div>
          <div id="inline-editor-stats" class="inline-editor-stats"></div>
        </div>
        <div id="selected-tile" class="selected-card">타일을 선택해봐.</div>
        <div id="zone-legend" class="legend legend-top"></div>
        <div class="map-frame">
          <svg id="hex-svg" role="img" aria-label="Noji hex land map"></svg>
        </div>
      </section>

      <aside class="side-panel right-panel">
        <section class="panel">
          <div class="panel-title"><h3>Active Quests</h3><span>missions</span></div>
          <div id="quests" class="quest-list"></div>
        </section>

        <section class="panel">
          <div class="panel-title"><h3>Build Objects</h3><span>owned / locked</span></div>
          <div id="objects" class="object-grid"></div>
        </section>
      </aside>
    </main>

    <section class="bottom-dock">
      <div class="panel wide">
        <div class="panel-title"><h3>Available Actions</h3><span>change the land</span></div>
        <div id="actions" class="action-row"></div>
      </div>
      <div class="panel players-panel">
        <div class="panel-title"><h3>Players</h3><span>party</span></div>
        <div id="players" class="players"></div>
      </div>
    </section>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
