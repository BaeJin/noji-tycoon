<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Noji Tycoon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <span class="crest">⬢</span>
        <div>
          <p>PROJECT NOJI</p>
          <h1>Noji Tycoon</h1>
        </div>
      </div>
      <div class="topbar-right">
        <div id="current-player" class="current-player"></div>
        <button id="open-admin" class="admin-button" title="지형 · 아이템 · 퀘스트 · 레벨 조건 · 테마 · 플레이어 관리">⚙ 관리</button>
      </div>
    </header>

    <main class="game-shell">
      <section class="layout-card village-area">
        <section class="land-card ornate">
          <p class="label">VILLAGE STATUS</p>
          <h2 id="land-name">Loading...</h2>
          <p id="land-summary"></p>
          <div class="level-meter">
            <span id="land-level">Lv.?</span>
            <div class="meter"><i id="level-fill"></i></div>
          </div>
          <details class="level-details">
            <summary>Tech Era <small>unlock ladder</small></summary>
            <div id="levels" class="era-list"></div>
          </details>
          <div id="upgrade-box" class="upgrade-box"></div>
        </section>
      </section>

      <section class="layout-card quest-area panel quest-panel">
        <div class="panel-title"><h3>Quest Board</h3><span>missions</span></div>
        <div class="quest-tabs">
          <button data-quest-tab="todo" class="active">가능</button>
          <button data-quest-tab="doing">진행</button>
          <button data-quest-tab="done">완료</button>
        </div>
        <div id="quests" class="quest-list"></div>
      </section>

      <section class="map-stage map-area">
        <div class="map-toolbar">
          <div class="map-title">
            <strong>MAP</strong>
          </div>
          <div class="map-buttons">
            <div class="augment-control">
              <strong>증강 이미지</strong>
              <div class="augment-row">
                <label>투명도 <input id="overlay-opacity" type="range" min="0" max="100" value="48" /></label>
                <button id="overlay-panel-toggle" class="augment-expand" type="button" aria-expanded="false" aria-controls="overlay-panel">▾</button>
              </div>
              <div id="overlay-panel" class="augment-panel" hidden>
                <label>크기 <input id="overlay-scale" type="range" min="20" max="220" value="100" /><span id="overlay-scale-label">100%</span></label>
                <label>위치 X <input id="overlay-offset-x" type="range" min="-100" max="100" value="0" /><span id="overlay-offset-x-label">0%</span></label>
                <label>위치 Y <input id="overlay-offset-y" type="range" min="-100" max="100" value="0" /><span id="overlay-offset-y-label">0%</span></label>
                <label>크기 X <input id="overlay-scale-x" type="range" min="20" max="220" value="100" /><span id="overlay-scale-x-label">100%</span></label>
                <label>크기 Y <input id="overlay-scale-y" type="range" min="20" max="220" value="100" /><span id="overlay-scale-y-label">100%</span></label>
                <button id="upload-overlay-image" type="button">이미지 파일 변경</button>
                <button id="bake-overlay-image" type="button">조정 이미지 저장</button>
                <input id="overlay-image-file" type="file" accept="image/*" hidden />
              </div>
            </div>
          </div>
        </div>

        <div id="zone-legend" class="legend legend-top"></div>

        <div id="map-frame-wrap" class="map-frame-wrap">
          <div id="map-frame" class="map-frame">
            <div id="map-canvas-layer" class="map-canvas-layer">
              <svg id="tile-svg" role="img" aria-label="Noji square land map"></svg>
              <img id="parcel-overlay" class="parcel-overlay" src="/overlays/hachunri-179-2-available-land.png" alt="하천리 179-2 가용 토지 참고 이미지" />
            </div>
          </div>

          <div class="editor-rail" role="toolbar" aria-label="map editor tools">
            <button data-editor-tool="inspect" class="active" title="Inspect — 보기/선택 (V)"><span>👆</span><small>보기</small></button>
            <button data-editor-tool="paint" title="Paint — 구역 칠하기 (B)"><span>🖌</span><small>칠하기</small></button>
            <button data-editor-tool="terrain" title="Terrain — 높이 올리기/낮추기/평탄화 (T)"><span>⛰</span><small>지형</small></button>
            <button data-editor-tool="place" title="Place — 오브젝트 설치/이동 (O), R로 회전"><span>📦</span><small>설치</small></button>
            <button data-editor-tool="measure" title="Measure — 거리 측정 (M)"><span>📏</span><small>측정</small></button>
            <i class="rail-divider"></i>
            <button id="editor-settings-toggle" title="맵 크기 · 파일"><span>⚙</span><small>설정</small></button>
          </div>

          <div id="editor-context" class="editor-context" hidden></div>

          <div id="editor-settings" class="editor-settings" hidden>
            <div class="settings-head">
              <strong>맵 설정</strong>
              <button id="editor-settings-close" title="닫기">✕</button>
            </div>
            <section>
              <h4>맵 크기 (m)</h4>
              <div class="settings-row">
                <input id="map-width-input" type="number" min="8" max="120" step="1" />
                <span class="dim">×</span>
                <input id="map-height-input" type="number" min="8" max="120" step="1" />
                <button id="apply-map-size">적용</button>
              </div>
            </section>
            <section>
              <h4>맵 파일</h4>
              <div class="settings-row">
                <button id="save-inline-map">💾 저장</button>
                <button id="load-inline-map">📂 불러오기</button>
                <button id="export-inline-map">⬇ Export</button>
              </div>
            </section>
            <input id="inline-map-file" type="file" accept="application/json,.json" hidden />
          </div>

          <div class="map-hud-zoom">
            <button id="map-zoom-in" title="확대">＋</button>
            <button id="map-zoom-reset" title="100%로">100%</button>
            <button id="map-zoom-out" title="축소">−</button>
            <button id="map-fit" title="화면에 맞추기">⛶</button>
            <button id="map-contour-toggle" title="등고선 표시/숨기기">⛰</button>
            <button id="map-boundary-toggle" title="구역 경계선 표시/숨기기">▣</button>
          </div>
          <div id="tile-tooltip" class="tile-tooltip" hidden></div>
        </div>

      </section>

      <section class="layout-card inventory-area panel wide">
        <div class="panel-title"><h3>Items</h3><span>inventory</span></div>
        <div id="inventory" class="inventory-grid"></div>
      </section>

      <section class="layout-card instance-area panel wide">
        <div class="panel-title"><h3>Instances</h3><span>crafted items</span></div>
        <div id="instance-panel" class="instance-panel"></div>
      </section>
    </main>
  </div>

  <div id="admin-modal" class="admin-modal" hidden>
    <div class="admin-window">
      <div class="admin-head">
        <strong>⚙ 콘텐츠 관리</strong>
        <nav class="admin-tabs">
          <button data-admin-tab="zones" class="active">지형</button>
          <button data-admin-tab="items">아이템</button>
          <button data-admin-tab="quests">퀘스트</button>
          <button data-admin-tab="levels">레벨 조건</button>
          <button data-admin-tab="themes">테마</button>
          <button data-admin-tab="players">플레이어</button>
        </nav>
        <button id="close-admin" title="닫기 (Esc)">✕</button>
      </div>
      <div id="admin-body" class="admin-body"></div>
    </div>
  </div>
  <div id="toast" class="toast" hidden></div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
